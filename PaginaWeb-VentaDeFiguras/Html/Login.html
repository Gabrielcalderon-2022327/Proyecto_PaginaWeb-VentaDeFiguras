<!doctype html>
<html lang="es">

<head>
  <meta charset=" UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" href="../Img/favicon.png" />
  <link rel="stylesheet" href="../Css/LoginStyle.css" />
</head>

<body>
  <form id="formularioLogin" class="formulario">
    <p class="form-title" id="form-title">LOGIN</p>

    <input type="email" id="email" placeholder="Ingrese email" required />
    <div class="password-box">
      <input type="password" id="password" placeholder="Ingresa contraseña" required />
      <img src="../Img/ojoAbierto.png" alt="" width="40px" id="mostrarImg" class="mostrarContra" />
    </div>

    <button type="submit" class="login-btn" value="iniciar" id="registrar-btn">
      <span>INICIAR SESION</span>
    </button>

    <p class="registro-link">
      No tienes cuenta?
      <a href="Register.html">Registrate</a>
    </p>
  </form>

  <script src="../Javascript/Login.js"></script>
</body>

</html>
