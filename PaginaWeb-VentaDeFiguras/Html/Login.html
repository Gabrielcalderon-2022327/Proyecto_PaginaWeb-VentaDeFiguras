<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset=" UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="icon" href="../Img/favicon.png">
<link rel="stylesheet" href="../Css/LoginStyle.css">
</head>

<body>
  <form id="formulario">
    <p class="form-title">LOGIN</p>

		<input type="email" id="username" placeholder="Ingrese usuario" required>
    <div class="password-box">
      <input type="password" id="password" placeholder="Ingresa contraseña" required>
      <img src="../Img/ojoAbierto.png" alt="" width="40px" id="mostrarContra">
    </div>

    <button type="submit" id="login-btn" value="iniciar">
      <span>INICIAR SESION</span>
    </button>
    
    <p id="registro-link">
      No tienes cuenta?
      <a href="">Registrate</a>
    </p>
    
  </form>
  
  <script src="../Javascript/Login.js"></script>
</body>

</html>
