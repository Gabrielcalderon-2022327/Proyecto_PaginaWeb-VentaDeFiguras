<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina principal</title>
  <link rel="icon" href="../Img/favicon.png" />
  <link rel="stylesheet" href="../Css/indexStyle.css">
</head>

<body>

  <header>
    <div class="contenedor-header">

      <div class="logo">
        <img src="../Img/logoPagina.png" alt="Logo de la pagina" width="250px">
      </div>

      <div class="barra-busqueda">
        <input type="text" placeholder="Buscar productos..." id="busqueda">
        <button>
          <img src="../Img/buscar.png" alt="Buscar" width="35px">
        </button>
      </div>

      <div class="header-icons">
        <p>Nombre usuario</p>
        <button class="perfil-btn">
          <img src="../Img/usuario.png" alt="Perfil" width="60px">
        </button>
        <button class="carrito-btn">
          <img src="../Img/carrito.png" alt="Carrito" width="60px">
        </button>
      </div>

    </div>
  </header>

  
  <main>
    <div class="contenedor-productos">

      <article class="producto">

      </article>

    </div>
  </main>

  
  <footer>
    <div class="footer-container">
      
      <div class="footer-seccion">
        <h4>Sobre nosotros</h4>
        <p>Información de la tienda.</p>
      </div>

      <div class="footer-seccion">
        <h4>Contacto</h4>
        <p>Email: gcalderon-202327@kinal.edu.gt</p>
      </div>

    </div>

    <div class="footer-info">
      <p>© 2026 Kyoto Figuras. Todos los derechos reservados.</p>
    </div>
  </footer>
</body>

</html>
